<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - MiniTwitter</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>MiniTwitter</h1>
    </div>

    <div class="topbar-right">
      <button id="homeButton" type="button">Inicio</button>
      <button id="newTuitButton" type="button">Escribir tuit</button>
      <button id="logoutButton" type="button">Cerrar sesión</button>
    </div>
  </header>

  <main class="page-container">
    <section class="timeline-container">
      <h2>Últimos tuits</h2>

      <div id="timeline">
        <p class="info-message">Aquí se mostrarán los tuits cuando conectemos con la API.</p>
      </div>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/index.js"></script>
</body>
</html>
