<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear tuit</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div class="topbar">
    <h1>MiniTwitter</h1>
    <div class="topbar-right">
      <button id="backButton" type="button">Volver</button>
    </div>
  </div>

  <div class="page-container">
    <div class="timeline-container">
      <h2>Escribir tuit</h2>

      <!--
        En este formulario recojo los datos necesarios para crear un tuit.
        He dejado la estructura simple para que sea clara y funcional.
      -->
      <form id="createTuitForm">
        <div class="form-group">
          <label for="text">Texto del tuit</label>
          <textarea
            id="text"
            name="text"
            maxlength="300"
            rows="5"
            placeholder="Escribe aquí tu tuit"
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="mediaType">Tipo de contenido multimedia</label>
          <select id="mediaType" name="mediaType">
            <option value="">Sin contenido multimedia</option>
            <option value="image">Imagen</option>
            <option value="video">Vídeo MP4</option>
            <option value="youtube">YouTube</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mediaUrl">URL multimedia</label>
          <input
            type="text"
            id="mediaUrl"
            name="mediaUrl"
            placeholder="https://..."
          >
        </div>

        <button type="submit">Publicar tuit</button>
        <p id="formMessage" class="error-message"></p>
      </form>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/create.js"></script>
</body>
</html>
